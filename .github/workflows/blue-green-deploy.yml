name: Blue-Green Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: miapp-jalapa-2026
  NODE_VERSION: '22.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. BUILD & TEST ──────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: |
            src/
            public/
            package.json
            package-lock.json
            node_modules/

  # ── 2. DEPLOY A STAGING (slot verde) ─────────────────────────────────────────
  deploy-staging:
    name: Deploy → Slot Staging (Verde)
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: app-build

      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configurar startup command
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --slot staging \
              --startup-file "node src/server.js"

      - name: Esperar reinicio del slot
        run: sleep 30

      - name: Configurar variables de entorno
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --slot staging \
              --settings \
                SCM_DO_BUILD_DURING_DEPLOYMENT=false \
                WEBSITE_NODE_DEFAULT_VERSION="~22" \
                APP_VERSION="${{ github.sha }}" \
                DEPLOYMENT_COLOR="green" \
                NODE_ENV="staging"

      - name: Deploy al slot staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: staging
          package: .

  # ── 3. VALIDACIÓN EN STAGING ──────────────────────────────────────────────────
  validate-staging:
    name: Validar Health en Staging
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Esperar que el slot arranque
        run: sleep 60

      - name: Health check en staging
        run: |
          STAGING_URL="https://${{ env.AZURE_WEBAPP_NAME }}-staging.azurewebsites.net/health"
          echo "Verificando: $STAGING_URL"

          for i in {1..8}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL")
            BODY=$(curl -s "$STAGING_URL")
            echo "Intento $i — HTTP $STATUS"
            echo "$BODY"

            if [ "$STATUS" = "200" ]; then
              HEALTH=$(echo "$BODY" | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
              if [ "$HEALTH" = "healthy" ]; then
                echo "Health check PASÓ"
                exit 0
              fi
            fi
            sleep 15
          done

          echo "Health check FALLÓ después de 8 intentos"
          exit 1

  # ── 4. SWAP: staging → producción ────────────────────────────────────────────
  swap-to-production:
    name: SWAP Staging → Producción
    runs-on: ubuntu-latest
    needs: validate-staging
    environment: production

    steps:
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ejecutar swap de slots
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --slot staging \
              --target-slot production

      - name: Verificar producción post-swap
        run: |
          PROD_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL")
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: producción no responde después del swap (HTTP $STATUS)"
            exit 1
          fi
          echo "Swap completado exitosamente"

  # ── 5. ROLLBACK (solo si falla swap) ─────────────────────────────────────────
  rollback:
    name: Rollback automático
    runs-on: ubuntu-latest
    needs: swap-to-production
    if: failure()

    steps:
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Re-swap para revertir
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Iniciando rollback — re-swap para restaurar versión anterior"
            az webapp deployment slot swap \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --slot staging \
              --target-slot production
            echo "Rollback completado"
